<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pokedex Game</title>

<script src="https://unpkg.com/react@17/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.12.3/babel.min.js"></script>

<style>

body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  text-align: center;
}

h1 {
  margin-bottom: 30px;
}

.pokedex {
  display: flex;
  justify-content: center;
  gap: 30px;
}

.pokecard {
  background: white;
  border-radius: 8px;
  padding: 15px;
  width: 140px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

.pokecard img {
  width: 80px;
}

.winner {
  color: green;
  font-weight: bold;
  margin-top: 10px;
}

</style>

</head>

<body>

<div id="root"></div>

<script src="Pokecard.js" type="text/jsx"></script>
<script src="Pokedex.js" type="text/jsx"></script>
<script src="Pokegame.js" type="text/jsx"></script>
<script src="App.js" type="text/jsx"></script>

</body>
</html>
